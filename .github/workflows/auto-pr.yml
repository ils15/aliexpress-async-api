name: Auto Release PR (develop -> master)

# Triggered on every push to develop.
# 1. Inspects commits since last master sync
# 2. Skips if there is nothing significant (only docs/test/chore)
# 3. Creates (or updates) a PR develop -> master, labelled by change type
# 4. Requests a Copilot code review on the PR

on:
  push:
    branches:
      - develop

jobs:
  auto-pr:
    name: Analyze & open release PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # --- 1. CHECKOUT ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for git log comparisons

      # --- 2. FETCH MASTER REF ---
      - name: Fetch master branch
        run: git fetch origin master --depth=100 2>/dev/null || true

      # --- 3. ENSURE LABELS EXIST ---
      - name: Ensure PR labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "enhancement"     --color "0075ca" --description "New feature or request"   --force 2>/dev/null || true
          gh label create "bug"             --color "d73a4a" --description "Something isn't working"  --force 2>/dev/null || true
          gh label create "refactor"        --color "e4e669" --description "Code refactoring"         --force 2>/dev/null || true
          gh label create "breaking-change" --color "b60205" --description "Breaking API change"      --force 2>/dev/null || true
          gh label create "documentation"   --color "0052cc" --description "Docs only"                --force 2>/dev/null || true
          gh label create "test"            --color "bfd4f2" --description "Tests only"               --force 2>/dev/null || true
          gh label create "chore"           --color "ffffff" --description "CI / build changes"       --force 2>/dev/null || true
          gh label create "auto-pr"         --color "ededed" --description "Auto-generated PR"        --force 2>/dev/null || true

      # --- 4. ANALYZE COMMITS ---
      - name: Analyze commits since master
        id: analysis
        run: |
          COMMITS=$(git log origin/master..HEAD --pretty=format:"%s" 2>/dev/null || \
                    git log --oneline -15 --pretty=format:"%s")

          # Nothing to release if no commits differ from master
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Count significant commits (feat / fix / refactor only)
          SIG=$(echo "$COMMITS" | grep -cE "^(feat|fix|refactor)(\(.+\))?(!)?:" 2>/dev/null || true)
          if [ "${SIG:-0}" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          # -- Determine highest-priority change type --
          if echo "$COMMITS" | grep -qE "BREAKING[[:space:]]CHANGE|(feat|fix)!:"; then
            TYPE="feat"
            LABEL="breaking-change"
            EMOJI="💥"
            BUMP="MAJOR"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            TYPE="feat"
            LABEL="enhancement"
            EMOJI="✨"
            BUMP="MINOR"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
            TYPE="fix"
            LABEL="bug"
            EMOJI="🐛"
            BUMP="PATCH"
          else
            TYPE="refactor"
            LABEL="refactor"
            EMOJI="♻️"
            BUMP="PATCH"
          fi

          echo "type=$TYPE"   >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "emoji=$EMOJI" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"   >> "$GITHUB_OUTPUT"

          # Latest commit message as PR title base
          LATEST=$(git log -1 --pretty=format:"%s")
          echo "latest_commit=${LATEST}" >> "$GITHUB_OUTPUT"

          # -- Build PR body and write to file --
          COMMIT_COUNT=$(git log origin/master..HEAD --oneline | wc -l)

          cat > /tmp/pr_body.md << BODY_EOF
          ## ${EMOJI} Automated Release PR: \`develop\` → \`master\`

          > Auto-generated by CI. Review, approve, and merge to publish to PyPI.

          ---

          ### Summary
          | | |
          |---|---|
          | Change type | \`${TYPE}\` |
          | Version bump | **${BUMP}** |
          | Commits | ${COMMIT_COUNT} |

          ### Commits in this release

          $(git log origin/master..HEAD --pretty=format:"- \`%h\` %s" | head -30)

          ---

          ### Pre-merge checklist
          - [ ] All CI tests pass
          - [ ] Coverage ≥ 85 %
          - [ ] \`CHANGELOG.md\` updated under \`[Unreleased]\`
          - [ ] No hardcoded credentials

          ---
          *This PR was opened automatically. Copilot review has been requested.*
          BODY_EOF

      # --- 5. CHECK FOR EXISTING OPEN PR ---
      - name: Check for existing open PR
        id: existing
        if: steps.analysis.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER=$(gh pr list \
            --base master \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number // ""')
          echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"

      # --- 6a. CREATE PR ---
      - name: Create release PR
        id: create-pr
        if: steps.analysis.outputs.skip == 'false' && steps.existing.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ steps.analysis.outputs.emoji }} ${{ steps.analysis.outputs.type }}: ${{ steps.analysis.outputs.latest_commit }}"
          NUMBER=$(gh pr create \
            --base master \
            --head develop \
            --title "$TITLE" \
            --body-file /tmp/pr_body.md \
            --label "${{ steps.analysis.outputs.label }}" \
            --label "auto-pr" \
            --no-maintainer-edit \
            | grep -oE '[0-9]+$')
          echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
          echo "✅ PR #${NUMBER} created"

      # --- 6b. UPDATE EXISTING PR ---
      - name: Update existing PR
        if: steps.analysis.outputs.skip == 'false' && steps.existing.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ steps.analysis.outputs.emoji }} ${{ steps.analysis.outputs.type }}: ${{ steps.analysis.outputs.latest_commit }}"
          gh pr edit ${{ steps.existing.outputs.number }} \
            --title "$TITLE" \
            --body-file /tmp/pr_body.md \
            --add-label "${{ steps.analysis.outputs.label }}"
          echo "🔄 PR #${{ steps.existing.outputs.number }} updated"

      # --- 7. REQUEST COPILOT REVIEW ---
      - name: Request Copilot review
        if: steps.analysis.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.create-pr.outputs.number || steps.existing.outputs.number }}"
          if [ -n "$PR" ]; then
            cat > /tmp/review_comment.md << 'EOF'
          🤖 **Auto PR opened by CI.**

          Use `@iris` in Copilot Chat to manage this PR (merge, update, close).
          Use `@temis` in Copilot Chat to run a code review before merging.

          Example:
          > @iris review PR and confirm it is ready to merge
          EOF
            gh pr comment "$PR" --body-file /tmp/review_comment.md 2>/dev/null \
              && echo "💬 Agent instructions comment added to PR #${PR}" \
              || echo "⚠️  Could not add PR comment (skipped)"
          fi

      # --- 8. SUMMARY ---
      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.analysis.outputs.skip }}" == "true" ]; then
            echo "## ⏭️ No release PR needed" >> "$GITHUB_STEP_SUMMARY"
            echo "No significant commits (feat/fix/refactor) found since master." >> "$GITHUB_STEP_SUMMARY"
          else
            PR="${{ steps.create-pr.outputs.number || steps.existing.outputs.number }}"
            echo "## ${{ steps.analysis.outputs.emoji }} Release PR ready" >> "$GITHUB_STEP_SUMMARY"
            echo "| | |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| PR | #${PR} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Type | \`${{ steps.analysis.outputs.type }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Version bump | **${{ steps.analysis.outputs.bump }}** |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Copilot review | requested |" >> "$GITHUB_STEP_SUMMARY"
          fi
